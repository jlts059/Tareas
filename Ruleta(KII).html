<html lang="es"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruleta Minimalista Táctil</title>
    <style>
        :root {
            --bg: #fdfdfd;
            --text: #475569;
            --accent: #e2e8f0;
            --result-color: #ec4899;
            --needle-color: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        /* QR Minimalista */
        .qr-container {
            position: absolute;
            top: 15px;
            right: 15px;
            background: white;
            padding: 5px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            z-index: 100;
        }
        .qr-container img { width: 55px; height: 55px; display: block; }

        /* Título con espacio superior */
        #main-title {
            font-size: 1.6rem;
            color: var(--text);
            font-weight: 800;
            margin-top: 50px;
            margin-bottom: 10px;
            text-align: center;
            width: 80%;
            line-height: 1.2;
        }

        /* Área de resultado con tamaño controlado para no solapar */
        #resultado-display {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
            color: var(--result-color);
            width: 100%;
            padding: 0 10px;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* Contenedor de la ruleta */
        #ruleta-wrapper {
            position: relative;
            margin: 20px 0;
            cursor: pointer; /* Indica que se puede clicar */
            -webkit-tap-highlight-color: transparent;
        }

        #aguja {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 20px solid var(--needle-color);
            z-index: 10;
        }

        .parpadeo-aguja {
            animation: blink 0.4s infinite alternate;
            border-top-color: var(--result-color) !important;
        }

        @keyframes blink {
            from { opacity: 1; transform: translateX(-50%) scale(1.1); }
            to { opacity: 0.5; transform: translateX(-50%) scale(1); }
        }

        #ruleta-circulo {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 6px solid var(--accent);
            background: linear-gradient(135deg, #f8fafc 0%, #cbd5e1 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
        }

        /* Icono de refresco dentro de la ruleta para invitar al click */
        #ruleta-circulo::after {
            content: "↻";
            font-size: 2rem;
            color: white;
            opacity: 0.5;
        }

        .setup-container {
            width: 100%;
            max-width: 350px;
            margin-top: 10px;
        }

        textarea {
            width: 100%;
            height: 80px;
            padding: 12px;
            border: 1px solid var(--accent);
            border-radius: 12px;
            font-size: 0.9rem;
            background: #fff;
            color: var(--text);
            box-sizing: border-box;
            resize: none;
        }

        .btn-download {
            margin-top: 15px;
            background: #f1f5f9;
            border: 1px solid var(--accent);
            color: #64748b;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .contador {
            margin-top: 10px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #94a3b8;
            letter-spacing: 1px;
        }

        .hidden { display: none !important; }

        @media (min-width: 768px) {
            #ruleta-circulo { width: 200px; height: 200px; }
            #resultado-display { font-size: 3rem; height: 140px; }
        }
    </style>
<style>
  .imageye-selected {
    outline: 2px solid black !important;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.5) !important;
  }
</style></head>
<body>

    <div class="qr-container" id="qrSection">
        <img id="qrCode" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&amp;data=https%3A%2F%2Fjlts059.github.io%2FTareas%2FRuleta.html" alt="QR">
    </div>

    <div id="main-title">Was würdest du im Sommer machen, wenn… ?</div>
    <div id="resultado-display">Girar</div>

    <div id="ruleta-wrapper" onclick="girar()">
        <div id="aguja"></div>
        <div id="ruleta-circulo"></div>
    </div>

    <div id="setup" class="setup-container">
        <textarea id="inputFrases" placeholder="Escribe frases (una por línea)...">... du im Lotto gewinnen würdest?
... du drei Monate Urlaub hättest?
... du ein Haus am Meer hättest?
... du absolut kein Geld hättest?
... es jeden Tag regnen würde?
... du perfekt Deutsch sprechen könntest?
... du ein Ticket nach Japan hättest?
... du 10 Jahre jünger oder älter wärst?
... es jeden Tag 45 Grad heiß wäre?
... du ein berühmter Influencer wärst?
... du kein Internet oder Handy hättest?
... du die ganze Welt bereisen könntest? Wohin würdest du reisen?</textarea>
    </div>

    <button class="btn-download" onclick="descargarHTML()">Descargar en HTML</button>
    <div id="contador-vivos" class="contador"></div>

    <script>
        let frasesOriginales = "";
        let frases = [];
        let anguloActual = 0;
        let ultimaGanadora = null;
        let configurado = false;
        let girando = false;

        window.onload = () => {
            const titleDiv = document.getElementById('main-title');
            if (!titleDiv.innerText.trim()) {
                const promptTitle = prompt("¿Título de la ruleta?");
                if (promptTitle) titleDiv.innerText = promptTitle;
            }
            document.getElementById('qrCode').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(window.location.href)}`;
        };

        function girar() {
            if (girando) return; // Evita clics múltiples durante el giro

            const input = document.getElementById('inputFrases');
            const setupDiv = document.getElementById('setup');
            const display = document.getElementById('resultado-display');
            const ruleta = document.getElementById('ruleta-circulo');
            const aguja = document.getElementById('aguja');
            const contador = document.getElementById('contador-vivos');

            if (!configurado) {
                frasesOriginales = input.value;
                frases = input.value.split('\n').filter(f => f.trim() !== "");
                if (frases.length === 0) {
                    alert("Añade frases en la caja de abajo.");
                    return;
                }
                setupDiv.classList.add('hidden');
                configurado = true;
            }

            if (ultimaGanadora) {
                const idx = frases.indexOf(ultimaGanadora);
                if (idx > -1) frases.splice(idx, 1);
            }

            if (frases.length === 0) {
                display.innerText = "¡FIN!";
                contador.innerText = "No quedan frases.";
                return;
            }

            girando = true;
            aguja.classList.add('parpadeo-aguja');
            display.style.opacity = "0.2";
            
            anguloActual += 1440 + Math.floor(Math.random() * 1440);
            ruleta.style.transform = `rotate(${anguloActual}deg)`;

            setTimeout(() => {
                girando = false;
                aguja.classList.remove('parpadeo-aguja');
                const indice = Math.floor(Math.random() * frases.length);
                ultimaGanadora = frases[indice];
                display.innerText = ultimaGanadora;
                display.style.opacity = "1";
                contador.innerText = `${frases.length - 1} RESTANTES`;
            }, 4000);
        }

        function descargarHTML() {
            const contentToSave = configurado ? frasesOriginales : document.getElementById('inputFrases').value;
            const currentTitle = document.getElementById('main-title').innerText;
            const docClone = document.documentElement.cloneNode(true);
            
            docClone.querySelector('#inputFrases').textContent = contentToSave;
            docClone.querySelector('#main-title').textContent = currentTitle;
            docClone.querySelector('#setup').classList.remove('hidden');
            docClone.querySelector('#resultado-display').innerText = "Toca la rueda";
            docClone.querySelector('#contador-vivos').innerText = "";
            
            const blob = new Blob([docClone.outerHTML], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'ruleta_pro.html';
            a.click();
        }
    </script>
