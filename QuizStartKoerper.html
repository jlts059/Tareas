<!DOCTYPE html><html><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Presentación Final</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 700px; text-align: center; }
        textarea { width: 100%; height: 100px; margin: 15px 0; padding: 12px; border: 2px solid #ddd; border-radius: 10px; }
        .controls { margin-top: 25px; display: flex; justify-content: center; gap: 10px; }
        .btn-status { padding: 15px 30px; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.3s; min-width: 160px; text-transform: uppercase; }
        .stop-mode { background-color: #34495e; color: white; }
        .seguir-mode { background-color: #2ecc71; color: white; }
        .download-mode { background-color: #2980b9; color: white; }
        .question-card { background: white; padding: 25px; border-radius: 15px; position: relative; min-height: 320px; display: flex; flex-direction: column; justify-content: center; }
        .question-text { font-size: 1.6rem; font-weight: bold; margin-bottom: 25px; color: #333; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .option { padding: 25px; border-radius: 12px; color: white; font-weight: bold; font-size: 1.2rem; display: flex; justify-content: space-between; align-items: center; transition: all 0.3s ease; opacity: 0.95; box-sizing: border-box; }
        
        /* COLORES SEGÚN IMAGEN 1 */
        .color-A { background-color: #e74c3c; } /* Rojo */
        .color-B { background-color: #2ecc71; } /* Verde */
        .color-C { background-color: #3498db; } /* Azul */
        .color-D { background-color: #f1c40f; color: #333 !important; } /* Amarillo */

        .is-correct { opacity: 1 !important; transform: scale(1.05); z-index: 5; box-shadow: 0 0 0 8px #2ecc71, 0 0 30px rgba(46, 204, 113, 0.8); }
        #mystery-overlay { position: absolute; top: 0; left: 0; font-size: 10rem; color: #000; background: rgba(255,255,255,0.4); backdrop-filter: blur(2px); width: 100%; height: 100%; display: none; align-items: center; justify-content: center; border-radius: 15px; z-index: 10; font-weight: bold; }
        .icon { font-size: 1.6rem; visibility: hidden; }
        .show-icon { visibility: visible; }
        #timer-bar-container { width: 100%; background: #eee; height: 8px; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        #timer-bar { height: 100%; background: #2ecc71; width: 100%; transition: width 5s linear; }
    </style>
</head><body>
            <div id="setup" style="display:none;"><textarea id="data-input">Hals	der	das	die	die (pl.)	der 
Zahn	der	das	die	die (pl.)	der 
Auge	der	das	die	die (pl.)	das 
Haare	der	das	die	die (pl.)	die
Mund	der	das	die	die (pl.)	der 
Kopf	der	das	die	die (pl.)	der 
Gesicht	der	das	die	die (pl.)	das 
Nase	der	das	die	die (pl.)	die 
Ohr	der	das	die	die (pl.)	das 
Bauch	der	das	die	die (pl.)	der 
Arm	der	das	die	die (pl.)	der 
Rücken	der	das	die	die (pl.)	der 
Hand	der	das	die	die (pl.)	die 
Finger	der	das	die	die (pl.)	der 
Fuß	der	das	die	die (pl.)	der 
Körperteil	der	das	die	die (pl.)	der 
Bein	der	das	die	die (pl.)	das 
Ellenbogen	der	das	die	die (pl.)	der 
Knie	der	das	die	die (pl.)	das 
Schulter	der	das	die	die (pl.)	die 
Körper	der	das	die	die (pl.)	der </textarea></div>
            <div id="quiz-area" style="width:100%;max-width:700px;margin:20px auto;">
                <div id="timer-bar-container"><div id="timer-bar"></div></div>
                <div id="card-target"></div>
                <div class="controls" style="display:flex;justify-content:center;">
                    <button id="main-action-btn" class="btn-status stop-mode" onclick="togglePause()">STOP</button>
                </div>
            </div>
            <script>
                
        let questions = [];
        let currentIdx = 0;
        let isPaused = false;
        let t1, t2, t3;

        function parseData(val) {
            const lines = val.trim().split('\n');
            const res = [];
            let start = (lines[0].toLowerCase().includes('pregunta')) ? 1 : 0;
            for(let i = start; i < lines.length; i++) {
                const c = lines[i].split('\t');
                if(c.length >= 6) res.push({ q: c[0], opt: [c[1], c[2], c[3], c[4]], ok: c[5].trim() });
            }
            return res;
        }

        function startQuiz() {
            questions = parseData(document.getElementById('data-input').value);
            if(questions.length === 0) return alert("Datos no válidos");
            document.getElementById('setup').style.display = 'none';
            document.getElementById('quiz-area').style.display = 'block';
            render();
        }

        function render() {
            if(currentIdx >= questions.length) {
                document.getElementById('quiz-area').innerHTML = "<h2>Fin</h2><button class='btn-status seguir-mode' onclick='location.reload()'>Reiniciar</button>";
                return;
            }
            const item = questions[currentIdx];
            document.getElementById('card-target').innerHTML = `
                <div class="question-card">
                    <div id="mystery-overlay">?</div>
                    <div class="question-text">${item.q}</div>
                    <div class="options-grid">
                        <div class="option color-A" data-t="${item.opt[0]}">A. ${item.opt[0]} <span class="icon">✔</span></div>
                        <div class="option color-B" data-t="${item.opt[1]}">B. ${item.opt[1]} <span class="icon">✔</span></div>
                        <div class="option color-C" data-t="${item.opt[2]}">C. ${item.opt[2]} <span class="icon">✔</span></div>
                        <div class="option color-D" data-t="${item.opt[3]}">D. ${item.opt[3]} <span class="icon">✔</span></div>
                    </div>
                </div>`;
            if(!isPaused) startFlow();
        }

        function startFlow() {
            const bar = document.getElementById('timer-bar');
            bar.style.transition = 'none'; bar.style.width = '100%';
            setTimeout(() => { bar.style.transition = 'width 5s linear'; bar.style.width = '0%'; }, 50);
            t1 = setTimeout(() => {
                document.getElementById('mystery-overlay').style.display = 'flex';
                t2 = setTimeout(reveal, 2000);
            }, 5000);
        }

        function reveal() {
            const ov = document.getElementById('mystery-overlay');
            if(ov) ov.style.display = 'none';
            const ok = questions[currentIdx].ok;
            document.querySelectorAll('.option').forEach(o => {
                if(o.getAttribute('data-t') === ok) {
                    o.classList.add('is-correct');
                    o.querySelector('.icon').classList.add('show-icon');
                }
            });
            if(!isPaused) t3 = setTimeout(() => { currentIdx++; render(); }, 3000);
        }

        function togglePause() {
            const b = document.getElementById('main-action-btn');
            if(!isPaused) {
                isPaused = true; b.innerText = "SEGUIR"; b.className = "btn-status seguir-mode";
                clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); reveal();
            } else {
                isPaused = false; b.innerText = "STOP"; b.className = "btn-status stop-mode";
                currentIdx++; render();
            }
        }

        function downloadHTML() {
            const data = document.getElementById('data-input').value;
            if(!data) return alert("Introduce datos");
            const head = document.head.innerHTML;
            const script = document.querySelector('script').innerHTML;
            
            const fileContent = `<!DOCTYPE html><html><head>${head}<\/head><body>
            <div id="setup" style="display:none;"><textarea id="data-input">${data}<\/textarea></div>
            <div id="quiz-area" style="width:100%;max-width:700px;margin:20px auto;">
                <div id="timer-bar-container"><div id="timer-bar"><\/div><\/div>
                <div id="card-target"><\/div>
                <div class="controls" style="display:flex;justify-content:center;">
                    <button id="main-action-btn" class="btn-status stop-mode" onclick="togglePause()">STOP<\/button>
                <\/div>
            <\/div>
            <script>
                ${script}
                window.onload = function() {
                    questions = parseData(document.getElementById('data-input').value);
                    render();
                };
            <\/script><\/body><\/html>`;

            const blob = new Blob([fileContent], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'quiz_funcional.html';
            a.click();
        }
    
                window.onload = function() {
                    questions = parseData(document.getElementById('data-input').value);
                    render();
                };
            </script></body></html>
