<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Presentación - Descargable</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 700px;
            text-align: center;
        }
        textarea {
            width: 100%; height: 100px; margin: 15px 0; padding: 12px;
            border: 2px solid #ddd; border-radius: 10px;
        }
        
        .controls { margin-top: 25px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .btn-status {
            padding: 15px 30px; border: none; border-radius: 30px;
            font-weight: bold; cursor: pointer; font-size: 1.1rem;
            transition: 0.3s; min-width: 160px; text-transform: uppercase;
        }
        .stop-mode { background-color: #34495e; color: white; }
        .seguir-mode { background-color: #2ecc71; color: white; }
        .download-mode { background-color: #2980b9; color: white; }

        .question-card { background: white; padding: 25px; border-radius: 15px; position: relative; min-height: 300px; display: flex; flex-direction: column; justify-content: center; }
        .question-text { font-size: 1.6rem; font-weight: bold; margin-bottom: 25px; color: #333; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .option {
            padding: 25px; border-radius: 12px;
            color: white; font-weight: bold; font-size: 1.2rem;
            display: flex; justify-content: space-between; align-items: center;
            transition: all 0.3s ease; opacity: 0.85;
            box-sizing: border-box;
        }

        .color-A { background-color: #27ae60; }
        .color-B { background-color: #e74c3c; }
        .color-C { background-color: #3498db; }
        .color-E { background-color: #f1c40f; color: #333 !important; }

        .is-correct {
            opacity: 1 !important;
            transform: scale(1.05);
            z-index: 5;
            box-shadow: 0 0 0 8px #2ecc71, 0 0 30px rgba(46, 204, 113, 0.8);
        }

        #mystery-overlay {
            position: absolute;
            top: 0; left: 0;
            font-size: 10rem;
            color: #000;
            background: rgba(255,255,255,0.4); 
            backdrop-filter: blur(2px);
            width: 100%; height: 100%;
            display: none; 
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            z-index: 10;
            font-weight: bold;
        }
        
        .icon { font-size: 1.6rem; visibility: hidden; }
        .show-icon { visibility: visible; }

        #timer-bar-container { width: 100%; background: #eee; height: 8px; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        #timer-bar { height: 100%; background: #2ecc71; width: 100%; transition: width 5s linear; }
    </style>
</head>
<body>

    <div class="container" id="setup">
        <h2>Modo Presentación (Generador)</h2>
        <textarea id="data-input" placeholder="Pregunta	Op1	Op2	Op3	Op4	RespuestaEscrita"></textarea>
        <div class="controls">
            <button class="btn-status seguir-mode" onclick="startQuiz()">Generar e Iniciar</button>
            <button class="btn-status download-mode" onclick="downloadHTML()">Descargar HTML</button>
        </div>
    </div>

    <div id="quiz-area" style="display:none; width: 100%; max-width: 700px;">
        <div id="timer-bar-container"><div id="timer-bar"></div></div>
        <div id="card-target"></div>
        <div class="controls">
            <button id="main-action-btn" class="btn-status stop-mode" onclick="togglePause()">STOP</button>
        </div>
    </div>

    <script>
        let questions = [];
        let currentIdx = 0;
        let isPaused = false;
        let timerReveal, timerMystery, timerNext;

        function parseData(text) {
            const lines = text.trim().split('\n');
            const result = [];
            let start = (lines[0].toLowerCase().includes('pregunta')) ? 1 : 0;
            for(let i = start; i < lines.length; i++) {
                const c = lines[i].split('\t');
                if(c.length >= 6) {
                    result.push({ 
                        q: c[0], 
                        options: [c[1].trim(), c[2].trim(), c[3].trim(), c[4].trim()],
                        correctText: c[5].trim() 
                    });
                }
            }
            return result;
        }

        function startQuiz() {
            const raw = document.getElementById('data-input').value;
            questions = parseData(raw);
            if(questions.length === 0) return alert("Pega los datos correctamente (separados por tabulaciones)");
            document.getElementById('setup').style.display = 'none';
            document.getElementById('quiz-area').style.display = 'block';
            render();
        }

        function render() {
            if(currentIdx >= questions.length) {
                document.getElementById('quiz-area').innerHTML = "<h2>Fin de la sesión</h2><button class='btn-status seguir-mode' onclick='location.reload()'>Reiniciar</button>";
                return;
            }
            const item = questions[currentIdx];
            document.getElementById('card-target').innerHTML = `
                <div class="question-card">
                    <div id="mystery-overlay">?</div>
                    <div class="question-text">\${item.q}</div>
                    <div class="options-grid">
                        <div class="option color-A" data-text="\${item.options[0]}">A. \${item.options[0]} <span class="icon">✔</span></div>
                        <div class="option color-B" data-text="\${item.options[1]}">B. \${item.options[1]} <span class="icon">✔</span></div>
                        <div class="option color-C" data-text="\${item.options[2]}">C. \${item.options[2]} <span class="icon">✔</span></div>
                        <div class="option color-E" data-text="\${item.options[3]}">E. \${item.options[3]} <span class="icon">✔</span></div>
                    </div>
                </div>`;
            if(!isPaused) startFlow();
        }

        function startFlow() {
            const bar = document.getElementById('timer-bar');
            bar.style.transition = 'none'; bar.style.width = '100%';
            setTimeout(() => { bar.style.transition = 'width 5s linear'; bar.style.width = '0%'; }, 50);
            timerMystery = setTimeout(() => {
                const overlay = document.getElementById('mystery-overlay');
                if(overlay) overlay.style.display = 'flex';
                timerReveal = setTimeout(revealAnswer, 2000);
            }, 5000);
        }

        function revealAnswer() {
            const overlay = document.getElementById('mystery-overlay');
            if(overlay) overlay.style.display = 'none';
            const correctText = questions[currentIdx].correctText;
            document.querySelectorAll('.option').forEach(opt => {
                if (opt.getAttribute('data-text') === correctText) {
                    opt.classList.add('is-correct');
                    opt.querySelector('.icon').classList.add('show-icon');
                }
            });
            if(!isPaused) {
                timerNext = setTimeout(() => { currentIdx++; render(); }, 3000);
            }
        }

        function togglePause() {
            const btn = document.getElementById('main-action-btn');
            if (!isPaused) {
                isPaused = true; btn.innerText = "SEGUIR"; btn.className = "btn-status seguir-mode";
                clearTimeout(timerMystery); clearTimeout(timerReveal); clearTimeout(timerNext);
                revealAnswer(); 
                document.getElementById('timer-bar').style.transition = 'none';
                document.getElementById('timer-bar').style.width = '0%';
            } else {
                isPaused = false; btn.innerText = "STOP"; btn.className = "btn-status stop-mode";
                currentIdx++; render();
            }
        }

        function downloadHTML() {
            const rawData = document.getElementById('data-input').value;
            if(!rawData) return alert("Primero introduce los datos para incluirlos en el archivo.");
            
            const fullHTML = `<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Quiz Guardado</title>
    \${document.head.innerHTML}
</head>
<body>
    <div class="container" id="setup" style="display:none;">
        <textarea id="data-input">\${rawData}</textarea>
    </div>
    <div id="quiz-area" style="width: 100%; max-width: 700px; display:block; margin: 0 auto;">
        <div id="timer-bar-container"><div id="timer-bar"></div></div>
        <div id="card-target"></div>
        <div class="controls">
            <button id="main-action-btn" class="btn-status stop-mode" onclick="togglePause()">STOP</button>
        </div>
    </div>
    <script>
        \${document.querySelector('script').innerHTML}
        // Iniciar automáticamente con los datos guardados
        window.onload = function() {
            const raw = document.getElementById('data-input').value;
            questions = parseData(raw);
            render();
        };
    <\/script>
</body>
</html>`;
            const blob = new Blob([fullHTML], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'mi_quiz_interactivo.html';
            a.click();
        }
    </script>
</body>
</html>
