<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruleta Pro Optimizada</title>
    <style>
        :root {
            --bg: #fdfdfd;
            --text: #475569;
            --accent: #e2e8f0;
            --button-bg: #f1f5f9;
            --button-hover: #e2e8f0;
            --result-color: #ec4899;
            --needle-color: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }

        /* QR Ajustado para no tapar en móvil */
        .qr-container {
            position: absolute;
            top: 10px;
            right: 10px;
            text-align: center;
            background: white;
            padding: 5px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            z-index: 100;
        }
        .qr-container img { width: 50px; height: 50px; display: block; }
        .qr-label { font-size: 0.4rem; font-weight: bold; margin-top: 2px; }

        @media (min-width: 768px) {
            .qr-container { top: 20px; right: 20px; padding: 10px; }
            .qr-container img { width: 70px; height: 70px; }
            .qr-label { font-size: 0.5rem; }
        }

        #main-title {
            font-size: 1.8rem;
            color: var(--text);
            font-weight: 800;
            margin-top: 40px;
            margin-bottom: 5px;
            text-align: center;
            padding: 0 60px; /* Espacio para que el QR no lo pise */
        }

        #resultado-display {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--result-color);
            width: 100%;
            line-height: 1.1;
            padding: 10px;
            box-sizing: border-box;
        }

        #ruleta-wrapper {
            position: relative;
            margin: 5px 0;
        }

        #aguja {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 20px solid var(--needle-color);
            z-index: 10;
        }

        .parpadeo-aguja {
            animation: blink 0.4s infinite alternate;
            border-top-color: var(--result-color) !important;
        }

        @keyframes blink {
            from { opacity: 1; transform: translateX(-50%) scale(1.1); }
            to { opacity: 0.5; transform: translateX(-50%) scale(1); }
        }

        #ruleta-circulo {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid var(--accent);
            background: linear-gradient(135deg, #f8fafc 0%, #cbd5e1 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: introSpin 2s cubic-bezier(0.2, 0, 0.2, 1);
        }

        @keyframes introSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(720deg); }
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            margin-top: 15px;
            width: 100%;
        }

        .btn-spin {
            background-color: var(--button-bg);
            border: 1px solid var(--accent);
            width: 65px;
            height: 65px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            order: 1; /* Forzamos que vaya primero */
        }

        .btn-spin svg { width: 28px; height: 28px; fill: var(--text); }

        .setup-container {
            width: 100%;
            max-width: 350px;
            order: 2; /* Va después del botón */
        }

        textarea {
            width: 100%;
            height: 80px;
            padding: 12px;
            border: 1px solid var(--accent);
            border-radius: 12px;
            font-size: 0.9rem;
            background: #fff;
            color: var(--text);
            box-sizing: border-box;
        }

        .btn-download {
            background: #f1f5f9;
            border: 1px solid var(--accent);
            color: #64748b;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            order: 3;
        }

        .contador {
            margin-top: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #94a3b8;
            order: 4;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="qr-container" id="qrSection">
        <img id="qrCode" src="" alt="QR">
        <div class="qr-label">COMPARTIR</div>
    </div>

    <div id="main-title"></div>
    <div id="resultado-display">...</div>

    <div id="ruleta-wrapper">
        <div id="aguja"></div>
        <div id="ruleta-circulo">
            <div style="width:10px; height:10px; background:white; border-radius:50%;"></div>
        </div>
    </div>

    <div class="actions">
        <button class="btn-spin" onclick="girar()" id="btnGirar">
            <svg viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
        </button>

        <div id="setup" class="setup-container">
            <textarea id="inputFrases" placeholder="Frases (una por línea)..."></textarea>
        </div>

        <button class="btn-download" id="btnDownload" onclick="descargarHTML()">Descargar en HTML</button>
        
        <div id="contador-vivos" class="contador"></div>
    </div>

    <script>
        let frasesOriginales = "";
        let frases = [];
        let anguloActual = 0;
        let ultimaGanadora = null;
        let configurado = false;

        window.onload = () => {
            const titleDiv = document.getElementById('main-title');
            if (!titleDiv.innerText.trim()) {
                const promptTitle = prompt("¿Título de la ruleta?");
                if (promptTitle) titleDiv.innerText = promptTitle;
            }
            document.getElementById('qrCode').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(window.location.href)}`;
        };

        function girar() {
            const input = document.getElementById('inputFrases');
            const setupDiv = document.getElementById('setup');
            const display = document.getElementById('resultado-display');
            const ruleta = document.getElementById('ruleta-circulo');
            const aguja = document.getElementById('aguja');
            const contador = document.getElementById('contador-vivos');

            if (!configurado) {
                frasesOriginales = input.value;
                frases = input.value.split('\n').filter(f => f.trim() !== "");
                if (frases.length === 0) return alert("Escribe frases primero");
                setupDiv.classList.add('hidden');
                configurado = true;
            }

            if (ultimaGanadora) {
                const idx = frases.indexOf(ultimaGanadora);
                if (idx > -1) frases.splice(idx, 1);
            }

            if (frases.length === 0) {
                display.innerText = "¡FIN!";
                document.getElementById('btnGirar').classList.add('hidden');
                return;
            }

            aguja.classList.add('parpadeo-aguja');
            display.style.opacity = "0.2";
            anguloActual += 1440 + Math.floor(Math.random() * 1440);
            ruleta.style.transition = "transform 4s cubic-bezier(0.15, 0, 0.15, 1)";
            ruleta.style.transform = `rotate(${anguloActual}deg)`;

            setTimeout(() => {
                aguja.classList.remove('parpadeo-aguja');
                const indice = Math.floor(Math.random() * frases.length);
                ultimaGanadora = frases[indice];
                display.innerText = ultimaGanadora;
                display.style.opacity = "1";
                contador.innerText = `${frases.length - 1} RESTANTES`;
            }, 4000);
        }

        function descargarHTML() {
            const contentToSave = configurado ? frasesOriginales : document.getElementById('inputFrases').value;
            const currentTitle = document.getElementById('main-title').innerText;
            const docClone = document.documentElement.cloneNode(true);
            
            docClone.querySelector('#inputFrases').textContent = contentToSave;
            docClone.querySelector('#main-title').textContent = currentTitle;
            docClone.querySelector('#setup').classList.remove('hidden');
            docClone.querySelector('#resultado-display').innerText = "...";
            docClone.querySelector('#btnGirar').classList.remove('hidden');
            
            const blob = new Blob([docClone.outerHTML], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'ruleta_movil.html';
            a.click();
        }
    </script>
</body>
</html>
