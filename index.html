<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classroom Flashcards</title>

<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    background-color: #f0f2f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
  }

  /* This is the new style for your live QR code box */
  #classroom-qr-container {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 200px; /* Size matching your red box */
    height: 200px;
    background-color: white;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
    box-sizing: border-box;
  }
  
  #classroom-qr-container img {
    max-width: 100%;
    max-height: 100%;
    border: none;
  }

  /* Your existing flashcard styles (from your previous work) */
  #instruction {
    margin-bottom: 0.5rem;
    color: #546e7a;
    font-weight: 500;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: -120px; /* Moves instructions up, now that card is centered */
  }

  .progress {
    margin-bottom: 20px;
    font-size: 0.9rem;
    color: #90a4ae;
  }

  #card {
    background: white;
    border-radius: 20px;
    padding: 2.5rem 1.5rem;
    max-width: 500px;
    width: 90%;
    min-height: 250px; /* Taller card for presentation */
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 1.6rem;
    line-height: 1.5;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    transition: transform 0.1s ease, background 0.2s ease;
    border-bottom: 8px solid #2c3e50;
    margin-bottom: 40px;
  }

  #card:active { transform: scale(0.98); }

  .controls { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }

  button {
    padding: 0.8rem 1.5rem;
    font-size: 1rem;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.2s;
  }

  .btn-next {
    background: #2c3e50;
    color: white;
    box-shadow: 0 4px 0 #1a252f;
  }

  .btn-shuffle {
    background: #e0e6ed;
    color: #2c3e50;
  }

  button:disabled {
    background: #ccc;
    cursor: not-allowed;
    box-shadow: none;
  }

  /* To handle overlapping if the window is small */
  @media (max-width: 900px) {
    #classroom-qr-container {
      position: static;
      margin-bottom: 30px;
      width: 150px;
      height: 150px;
    }
  }
</style>
</head>

<body onload="generateClassroomQR()">

<div id="classroom-qr-container">
  <div id="loading-qr" style="color:#666; font-size:0.9rem;">Loading QR...</div>
  </div>

<div id="instruction">Tap the card to flip</div>
<div class="progress" id="progress">Card 1 of 16</div>

<div id="card" onclick="flipCard()">Loading...</div>

<div class="controls">
  <button class="btn-next" id="nextBtn" onclick="nextCard()">Next Card ➔</button>
  <button class="btn-shuffle" onclick="resetDeck()">🔀 Shuffle</button>
</div>

<script>
// --- CORE DECK LOGIC (Same as you have now) ---
const originalDeck = [
  { es: "Estoy acostumbrado al ruido.", en: "I am used to the noise." },
  { es: "Solía ir andando al trabajo.", en: "I used to walk to work." },
  { es: "Solía llover más en mayo que en abril.", en: "It used to rain more in May than in April." },
  { es: "Voy al gimnasio dos veces a la semana.", en: "I go to the gym twice a week." },
  { es: "Solíamos ir al cine todos juntos.", en: "We used to go to the cinema all together." },
  { es: "Vivía en un pequeño pueblo pesquero.", en: "I used to live in a small fishing village." },
  { es: "Iba a Londres cuatro o cinco veces al año.", en: "I used to go to London four or five times a year." },
  { es: "Suelo irme a la cama sobre las 11.30 p. m.", en: "I usually go to bed around 11.30 p.m." },
  { es: "Antes tenía un PC, pero ahora tengo un Mac.", en: "I used to have a PC but now I have a Mac." },
  { es: "Pronto tendré que acostumbrarme a planchar.", en: "Soon I will have to get used to ironing." },
  { es: "Cuando era estudiante, no pertenecía a ningún club", en: "When I was a student I didn't use to belong to any clubs." },
  { es: "Tardamos un poco en acostumbrarnos a vivir en el campo.", en: "It took us a while to get used to living in the countryside." },
  { es: "Antes de tener el AVE, a menudo iba a Madrid en coche.", en: "Before the AVE I often used to go to Madrid by car." },
  { es: "No me acostumbro a tener que pagar la comida en los aviones.", en: "I can't get used to having to pay for food on planes." },
  { es: "Estamos acostumbrados a tener que traducir cosas para los visitantes.", en: "We are used to having to translate things for visitors." },
  { es: "Cuando era estudiante los sábados me quedaba levantado toda la noche.", en: "When I was a student I used to stay up all night on Saturdays." }
];

let deck = [];
let currentIndex = 0;
let isFlipped = false;

function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

function resetDeck() {
  deck = shuffle([...originalDeck]);
  currentIndex = 0;
  isFlipped = false;
  document.getElementById("nextBtn").disabled = false;
  updateDisplay();
}

function updateDisplay() {
  const current = deck[currentIndex];
  document.getElementById("progress").textContent = `Card ${currentIndex + 1} of ${deck.length}`;
  const card = document.getElementById("card");
  if (!isFlipped) {
    card.textContent = current.es;
    card.style.background = "white";
    card.style.color = "#2c3e50";
  } else {
    card.textContent = current.en;
    card.style.background = "#eef6ff";
    card.style.color = "#1565c0";
  }
}

function flipCard() {
  if (currentIndex === -1) return;
  isFlipped = !isFlipped;
  updateDisplay();
}

function nextCard() {
  if (currentIndex < deck.length - 1) {
    currentIndex++;
    isFlipped = false;
    updateDisplay();
  } else {
    document.getElementById("card").innerHTML = "<b>Excellent work!</b><br>You've finished the deck.";
    document.getElementById("card").style.background = "#d4edda";
    document.getElementById("nextBtn").disabled = true;
    currentIndex = -1;
  }
}

// --- NEW CLASSROOM QR LOGIC ---
function generateClassroomQR() {
  // 1. Get the current URL of the page (e.g., your-username.github.io/your-repo/)
  const currentUrl = window.location.href;
  
  // 2. Create the URL for the free quickchart.io QR code API
  const qrApiUrl = `https://quickchart.io/qr?text=${encodeURIComponent(currentUrl)}&size=200&margin=1`;
  
  // 3. Create an image element and set its source to that API URL
  const qrImg = new Image();
  qrImg.src = qrApiUrl;
  qrImg.alt = "Scan to view flashcards on your device";
  
  // 4. When the image is done loading, swap it for the 'Loading' text
  qrImg.onload = function() {
    const container = document.getElementById("classroom-qr-container");
    container.innerHTML = ""; // Clear 'Loading...'
    container.appendChild(qrImg);
  };
}

// Start everything
resetDeck();
</script>

</body>
</html>
